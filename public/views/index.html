<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
  <link rel="manifest" href="/manifest.json">

  <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,500,700" rel="stylesheet">
  <link href="https://use.fontawesome.com/releases/v5.0.0/css/all.css" rel="stylesheet">

  <link rel="stylesheet" href="./styles/stylesheets/bulma.css">
  <link href="../styles/stylesheets/base.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.4/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.4/angular-route.js"></script>
  <script src="./client.js"></script>
  <script src="/scripts/controllers/index.controller.js"></script>
  <script src="/scripts/services/index.service.js"></script>
  <title>Mike Ekert</title>

</head>

<body ng-app="myApp" ng-controller="UserController as uc">
  <section class="columns main-container">
    <div class="hero-left column" ng-class="{'move-div': uc.move}">
      <!-- <div class="cube-one"> </div> -->
      <p>
        <span>Michael Ekert</span>
      </p>
      <h2>software developer.</h2>
      <h2>creative talent.</h2>
      <h2>nerd.</h2>
      <footer>
        <div class="hero-left-footer has-text-left">
          <nav>
            <a href="https://www.linkedin.com/in/michaelekert/" target="_blank" class="linkedin">
              <i class="fab fa-linkedin is-centered" aria-hidden="true"></i>
            </a>
            <a href="https://github.com/mikeekert" target="_blank" class="github">
              <i class="fab fa-github is-centered" aria-hidden="true"></i>
            </a>
            <a href="https://twitter.com/parkkway" target="_blank" class="twitter">
              <i class="fab fa-twitter is-centered" aria-hidden="true"></i>
            </a>
            <a href="http://blog.mikeekert.com" target="_blank" class="wordpress">
              <i class="fab fa-wordpress-simple is-centered" aria-hidden="true"></i>
              <div class="reveal">Find out what I'm learning!
              </div>
            </a>
          </nav>
        </div>
      </footer>
    </div>
    <div class="hero-right column">
      <div class="hero-right-project">
        <div class="hero-right-title">
          <h2>PROJECTS</h2>
          <p>
            <small>Code samples completed while at Prime Academy</small>
          </p>
        </div>
        <div class="project">

          <div ng-repeat="i in uc.articleArrays | filter: {featured: 'true'}">
              <article>
                  <div class="left" ng-class="{'fade-div': i.appClass && uc.move==false}">
                    <figure class="image is-500x500">
                      <div class="proj-image">
                        <img ng-src="{{i.image}}">
                      </div>
                    </figure>
                  </div>
                  <div class="close level" ng-show="uc.move" ng-click="uc.closeDiv(i)">
                    <i class="far fa-window-close"></i>
                  </div>
                  <div class="media-content level" ng-class="{'fade-content': i.appClass}" ng-click="uc.moveDiv(i)" ng-show="!uc.move">
                    <div class="content level">
                      <strong>More</strong>
                    </div>
                  </div>
                </article>
          </div>

          <!-- box -->
          <div ng-mouseover="uc.fadeIn(i)" ng-mouseleave="uc.fadeOut(i)" ng-repeat="i in uc.articleArrays track by $index" ng-hide="uc.showAll===false">
            <article>
              <div class="left" ng-class="{'fade-div': i.appClass && uc.move==false}">
                <figure class="image is-500x500">
                  <div class="proj-image">
                    <img ng-src="{{i.image}}">
                  </div>
                </figure>
              </div>
              <div class="close level" ng-show="uc.move" ng-click="uc.closeDiv(i)">
                <i class="far fa-window-close"></i>
              </div>
              <div class="media-content level" ng-class="{'fade-content': i.appClass}" ng-click="uc.moveDiv(i)" ng-show="!uc.move">
                <div class="content level">
                  <strong>More</strong>
                </div>
              </div>
            </article>
          </div>
          <!-- box -->


        </div>
      </div>
    </div>

  </section>
</body>

</html>
